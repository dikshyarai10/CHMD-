<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Teacher's Dashboard</title>
    <link rel="stylesheet" href="dashboard.css" />
  </head>
  <body>
    <nav>
      <img
        src="/CHMD-/web_project/images/logo.jpg"
        alt="CHMD Logo"
        class="nav-logo"
      />
      <h5>
        Children's House Montessori <br />
        Elementary School
      </h5>
      <div class="teacher">
        <img
          src="/CHMD-/web_project/images/teacherimg.png"
          alt="teacher"
          width="64px"
          height="58px"
          class="teacherimg"
        />
        <p>Teacher Nilima Rai</p>
        <img
          src="/CHMD-/teacher_portal/timages/notification.png"
          alt="notification_bell"
          class="bell"
          width="30px"
          height="26px"
        />
        <img
          src="/CHMD-/teacher_portal/timages/Message.png"
          alt="message_icon"
          class="msgicon"
          width="24"
          height="18"
        />
      </div>
    </nav>
    <div class="menubox">
      <div class="menuchmd">
        <img
          src="/CHMD-/teacher_portal/timages/menu1.png"
          alt="data"
          class="menudata"
        />
        <p class="menudata_name">CHM</p>
        <img
          src="/CHMD-/teacher_portal/timages/menu2.png"
          alt="menudataicon"
          class="menudata_icon"
        />
        <div class="dash1">
          <img
            src="/CHMD-/teacher_portal/timages/dash1.png"
            alt="dashicon"
            class="dashicon"
          />
          <p>Dashboard</p>
        </div>
        <div class="dash2">
          <img
            src="/CHMD-/teacher_portal/timages/enquiryicon.png"
            alt="enqicon"
            class="enquiryicon"
          />
          <p>Enquiry</p>
        </div>
      </div>
    </div>
    <div class="branchname">
      <h2>CHM Teacher/Administrative Staff Branch</h2>
    </div>
    <div class="boxes1">
      <div class="box1">
        <img
          src="/CHMD-/teacher_portal/timages/studenticon.png"
          alt="studenticon"
          class="studenticon"
        />
        <p>Students</p>
      </div>
      <div class="box2">
        <img
          src="/CHMD-/teacher_portal/timages/diaryicon.png"
          alt="diaryicon"
          class="diaryicon"
        />
        <p>Diary</p>
      </div>
      <div class="box3">
        <img
          src="/CHMD-/teacher_portal/timages/reporticon.png"
          alt="reporticon"
          class="reporticon"
        />
        <p>Report Card</p>
      </div>
    </div>
    <div class="boxes2">
      <div class="box4">
        <img
          src="/CHMD-/teacher_portal/timages/routineicon.png"
          alt="routineicon"
          class="routineicon"
        />
        <p>Routine</p>
      </div>
      <div class="box5">
        <img
          src="/CHMD-/teacher_portal/timages/discussionicon.png"
          alt="discussionicon"
          class="discussionicon"
        />
        <p>Discussion</p>
      </div>
      <div class="box6">
        <img
          src="/CHMD-/teacher_portal/timages/idcardicon.png"
          alt="idcardicon"
          class="idcardicon"
        />
        <p>Identity Card</p>
      </div>
    </div>
  </body>
</html>
